name: OWASP ZAP Baseline Scan

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

permissions:
    contents: read
    issues: write
    security-events: write

jobs:
    zap_scan:
        name: ZAP Baseline Scan
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: OWASP ZAP Baseline Scan
              uses: zaproxy/action-baseline@v0.14.0
              with:
                  target: "http://localhost"
                  fail_action: false
